{% extends 'base.html'%}
{% load my_tags %}
{% block title%}Редактирование профиля{% endblock %}
{% load static %}
{% block content %}

<div class="container ">
    <div class="col-12">
        <div class="card mb-4 box-shadow">
            <div class="card-header">
                <h2 class="my-0 font-weight-normal">Редактирование профиля</h2>
            </div>
            <div class="container  text-center">

                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="p-2 btn btn-outline-success fixed-size-btn" >Сохранить</button>
                    <a href="/" class="p-2 btn btn-lg btn-block btn-outline-info">Отмена</a>
                </form>

            </div>
        </div>
    </div>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</div>
{% endblock %}
