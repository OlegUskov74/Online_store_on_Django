{% extends 'base.html'%}
{% block title%}Вход{% endblock %}
{% load static %}

{% block content %}
<style>.custom-input {
    width: 100%;
    padding: 10px;
    font-size: 20px;
    border: 3px solid #ccc;
    border-radius: 5px;
}
</style>

<h1>Вход в систему</h1>

<div class="container ">
    <div class="col-12">
        <div class="card mb-4 box-shadow">
            <div class="card-header">
                <h2 class="my-0 font-weight-normal">Вход</h2>
            </div>
            <div class="container  text-center">

                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="p-2 btn btn-outline-success fixed-size-btn" >Войти</button>
                    <a href="/" class="p-2 btn btn-lg btn-block btn-outline-info">Отмена</a>
                </form>

            </div>
        </div>
    </div>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</div>
{% endblock %}
