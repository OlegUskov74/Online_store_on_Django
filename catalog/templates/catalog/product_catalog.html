{% extends 'base.html' %}
{% load my_tags %}
{% block title %}Каталог товара{% endblock %}

{% block content %}
{% include 'header.html' %}

<div class="album py-5 bg-body-tertiary">
    <div class="container">
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
            {% for prod in products %}
            <div class="col">
                <div class="card shadow-sm">
                    <img src="{{prod.photo | media_filter}}">
                    <div class="card-body">
                        <p class="card-text">{{ prod.name }}</p>
                        <p class="card-text">{{ prod.description }}</p>
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="btn-group">
                                <a class="btn btn-lg btn-block btn-outline-primary" href="/product_card/{{prod.id}}/">Подробно</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
